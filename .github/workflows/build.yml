name: Build Slides

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Combine Markdown
        run: |
          cat slides/[0-9]*.md > slides/slides.md

      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: slides

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/deploy-pages@v4
