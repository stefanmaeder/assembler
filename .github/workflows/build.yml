name: Build Slides

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Combine Markdown
        run: |
          rm -f slides/slides.md
          for file in slides/[0-9]*.md; do
            cat "$file" >> slides/slides.md
            echo -e "\n\n---\n\n" >> slides/slides.md
          done

      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: slides

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/deploy-pages@v4
